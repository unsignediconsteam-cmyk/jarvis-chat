<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS ULTRA SYSTEM</title>

<style>
body{
	margin:0;
	background: radial-gradient(circle at center,#02040a,#000);
	font-family: monospace;
	color:#00f2ff;
	overflow:hidden;
}

/* ================= CHAT ================= */
.chat-container{
	position:relative;
	z-index:5;
	max-width:800px;
	margin:auto;
	padding:20px;
}

#chat-messages{
	height:65vh;
	overflow-y:auto;
	padding:10px;
}

.message{
	margin:10px 0;
	padding:10px;
	border-radius:10px;
	background:rgba(0,0,0,0.4);
	border:1px solid rgba(0,242,255,0.2);
}

.user-message{text-align:right;color:#fff;}
.assistant-message{text-align:left;color:#00f2ff;}

textarea,button{
	width:100%;
	padding:10px;
	margin-top:10px;
	background:#000;
	border:1px solid #00f2ff;
	color:#00f2ff;
}

/* ================= HUD ================= */
#hud{
	position:fixed;
	inset:0;
	pointer-events:none;
	z-index:1;
}

.core{
	position:absolute;
	top:50%;
	left:50%;
	width:340px;
	height:340px;
	transform:translate(-50%,-50%);
	border-radius:50%;
	border:2px solid #00f2ff;
	box-shadow:0 0 50px #00f2ff;
	animation:pulse 2.5s infinite;
}

@keyframes pulse{
	0%{transform:translate(-50%,-50%) scale(1);opacity:.2;}
	50%{transform:translate(-50%,-50%) scale(1.2);opacity:.5;}
	100%{transform:translate(-50%,-50%) scale(1);opacity:.2;}
}

.scan{
	position:absolute;
	width:100%;
	height:100%;
	background:linear-gradient(to bottom,transparent,rgba(0,242,255,0.08),transparent);
	animation:scan 4s linear infinite;
}

@keyframes scan{
	0%{transform:translateY(-100%);}
	100%{transform:translateY(100%);}
}

.panel{
	position:absolute;
	top:20px;
	left:20px;
	padding:10px;
	border:1px solid #00f2ff;
	background:rgba(0,0,0,0.4);
	box-shadow:0 0 15px #00f2ff;
}

/* ================= PARTICULAS ================= */
.particle{
	position:absolute;
	width:2px;
	height:2px;
	background:#00f2ff;
	border-radius:50%;
	animation:float 6s linear infinite;
	opacity:.5;
}

@keyframes float{
	from{transform:translateY(100vh);}
	to{transform:translateY(-10vh);}
}

.active-glow{
	box-shadow:0 0 80px #00f2ff !important;
	border-color:#00ffcc !important;
}
</style>
</head>

<body>

<!-- CHAT -->
<div class="chat-container">
	<div id="chat-messages">
		<div class="message assistant-message">JARVIS ULTRA SYSTEM ONLINE.</div>
	</div>

	<textarea id="user-input"></textarea>
	<button id="send-button">ENVIAR</button>
</div>

<!-- HUD -->
<div id="hud">
	<div class="core" id="core"></div>
	<div class="scan"></div>

	<div class="panel">
		<div>JARVIS SYSTEM</div>
		<div id="status">ONLINE</div>
		<div id="mode">VOICE READY</div>
	</div>
</div>

<!-- PARTICULAS -->
<script>
for(let i=0;i<60;i++){
	const p=document.createElement("div");
	p.className="particle";
	p.style.left=Math.random()*100+"vw";
	p.style.animationDuration=(Math.random()*6+3)+"s";
	document.body.appendChild(p);
}
</script>

<!-- CORE AI -->
<script>
const input=document.getElementById("user-input");
const chat=document.getElementById("chat-messages");
const core=document.getElementById("core");
const status=document.getElementById("status");
const mode=document.getElementById("mode");

/* ================= VOZ ================= */
function speak(text){
	if(!text) return;

	const u=new SpeechSynthesisUtterance(text);

	let voices=speechSynthesis.getVoices();

	const v=
	voices.find(v=>v.lang==="es-ES" && v.name.toLowerCase().includes("female"))||
	voices.find(v=>v.lang==="es-ES")||
	voices[0];

	if(v) u.voice=v;

	u.rate=1.3;
	u.pitch=1.35;

	speechSynthesis.cancel();
	speechSynthesis.speak(u);

	status.innerText="SPEAKING";
	setTimeout(()=>status.innerText="ONLINE",1500);
}

/* ================= UI ================= */
function addMsg(t,c){
	const d=document.createElement("div");
	d.className="message "+c;
	d.innerText=t;
	chat.appendChild(d);
	chat.scrollTop=chat.scrollHeight;
}

/* ================= EFECTO HUD ================= */
function activate(){
	core.classList.add("active-glow");
	setTimeout(()=>core.classList.remove("active-glow"),700);
}

/* ================= CHAT ================= */
document.getElementById("send-button").onclick=async()=>{
	const text=input.value;
	if(!text) return;

	addMsg(text,"user-message");
	input.value="";

	activate();
	mode.innerText="PROCESSING";

	// 🔥 aquí conectarías tu API real
	const reply="Procesando solicitud...";
	addMsg(reply,"assistant-message");

	speak(reply);

	setTimeout(()=>{
		mode.innerText="VOICE READY";
	},1200);
};

/* ================= WAKE WORD ================= */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
	const rec=new SR();
	rec.lang="es-ES";
	rec.continuous=true;

	rec.onresult=(e)=>{
		const t=e.results[e.results.length-1][0].transcript.toLowerCase();

		if(t.includes("jarvis")){
			speak("Sí señor");
		}
	};

	rec.onend=()=>rec.start();
	rec.start();
}
</script>

</body>
</html>
