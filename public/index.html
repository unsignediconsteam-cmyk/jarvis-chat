<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JARVIS AI</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 200px);
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.user-message {
				background: var(--user-msg-bg);
				margin-left: auto;
			}

			.assistant-message {
				background: var(--assistant-msg-bg);
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background: white;
				gap: 0.5rem;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				resize: none;
			}

			button {
				padding: 0 1rem;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}

			#send-button {
				background: var(--primary-color);
				color: white;
			}

			#mic-button {
				background: #111827;
				color: white;
			}

			#send-button:hover {
				background: var(--primary-hover);
			}

			#mic-button:hover {
				background: #000;
			}

			.typing-indicator {
				display: none;
				padding: 1rem;
				color: var(--text-light);
			}

			.typing-indicator.visible {
				display: block;
			}
		</style>
	</head>

	<body>
		<header>
			<h1>JARVIS AI</h1>
			<p>Assistant System Online</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Buenos días señor. JARVIS está en línea.</p>
				</div>
			</div>

			<div id="typing-indicator" class="typing-indicator">
				JARVIS está pensando...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Habla con JARVIS..."
					rows="1"
				></textarea>

				<button id="mic-button" onclick="startMic()">🎤</button>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>JARVIS AI System</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
