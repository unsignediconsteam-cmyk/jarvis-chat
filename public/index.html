<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS AI</title>

<style>
body {
	margin:0;
	font-family: Arial;
	background: radial-gradient(circle at center, #02060a, #000);
	color:#00ffe5;
	overflow:hidden;
}

/* =========================
   🧠 HUD PRO (MEJORADO)
========================= */

#hud {
	position: fixed;
	top: 20px;
	right: 20px;
	width: 280px;
	padding: 16px;
	border-radius: 16px;
	background: rgba(0,255,229,0.05);
	border: 1px solid rgba(0,255,229,0.25);
	backdrop-filter: blur(12px);
	box-shadow: 0 0 30px rgba(0,255,229,0.15);
}

#hud h3 {
	margin:0;
	font-size: 14px;
	letter-spacing: 2px;
}

.hud-status {
	margin-top:10px;
	font-size:12px;
	color:#aaa;
}

.hud-glow {
	height: 6px;
	margin-top: 12px;
	background: rgba(0,255,229,0.2);
	border-radius: 10px;
	overflow:hidden;
}

.hud-glow div {
	height:100%;
	width:50%;
	background:#00ffe5;
	animation: move 2s infinite ease-in-out;
}

@keyframes move {
	0% { width: 20%; }
	50% { width: 100%; }
	100% { width: 40%; }
}

/* =========================
   💬 CHAT
========================= */

.chat {
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	width:700px;
}

#chat-messages {
	height:420px;
	overflow-y:auto;
	padding:12px;
	background:rgba(0,0,0,0.6);
	border-radius:12px;
	border:1px solid rgba(0,255,229,0.2);
}

.message {
	margin:8px 0;
}

.user-message { color:#00ffe5; }
.assistant-message { color:#fff; }

/* INPUT */

.input {
	display:flex;
	margin-top:10px;
}

#user-input {
	flex:1;
	padding:10px;
	border:none;
	border-radius:8px;
	background:#001014;
	color:#00ffe5;
	outline:none;
}

button {
	margin-left:6px;
	padding:10px 14px;
	border:none;
	border-radius:8px;
	cursor:pointer;
	background:#00ffe5;
	color:#000;
	font-weight:bold;
}

#mic-btn {
	background:#ff3b3b;
	color:#fff;
}

#typing {
	display:none;
	font-size:12px;
	color:#777;
	margin-top:6px;
}
</style>
</head>

<body>

<!-- 🧠 HUD -->
<div id="hud">
	<h3>JARVIS CORE</h3>
	<div class="hud-status">STATUS: ONLINE</div>
	<div class="hud-glow"><div></div></div>
</div>

<!-- 💬 CHAT -->
<div class="chat">

	<div id="chat-messages"></div>

	<div id="typing">Procesando...</div>

	<div class="input">
		<textarea id="user-input"></textarea>

		<button id="mic-btn">🎤</button>
		<button id="send-button">SEND</button>
	</div>

</div>

<script src="chat.js"></script>
</body>
</html>
