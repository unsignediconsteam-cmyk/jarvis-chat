<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS AI</title>

<style>
body {
	margin:0;
	font-family: Arial;
	background: radial-gradient(circle at center, #050b10, #000);
	color: #00ffe5;
	overflow:hidden;
}

/* =========================
   🧠 HUD JARVIS
========================= */

#hud {
	position: fixed;
	top: 20px;
	right: 20px;
	width: 260px;
	height: 160px;
	border-radius: 14px;
	background: rgba(0, 255, 229, 0.05);
	border: 1px solid rgba(0, 255, 229, 0.3);
	box-shadow: 0 0 20px rgba(0,255,229,0.2);
	backdrop-filter: blur(12px);
	padding: 12px;
	animation: glow 3s infinite alternate;
}

@keyframes glow {
	from { box-shadow: 0 0 10px rgba(0,255,229,0.2); }
	to { box-shadow: 0 0 25px rgba(0,255,229,0.5); }
}

#hud h3 {
	margin:0;
	font-size: 14px;
	color:#00ffe5;
}

.hud-bar {
	height: 6px;
	background: rgba(0,255,229,0.2);
	border-radius: 10px;
	margin-top: 10px;
	overflow:hidden;
}

.hud-bar div {
	height:100%;
	width:60%;
	background:#00ffe5;
	animation: pulse 2s infinite;
}

@keyframes pulse {
	0% { width: 30%; }
	50% { width: 90%; }
	100% { width: 50%; }
}

/* =========================
   💬 CHAT
========================= */

.chat-container {
	position: absolute;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
	width: 700px;
}

#chat-messages {
	height: 400px;
	overflow-y:auto;
	background: rgba(0,0,0,0.6);
	border: 1px solid rgba(0,255,229,0.2);
	padding: 10px;
	border-radius: 12px;
	backdrop-filter: blur(8px);
}

.message {
	margin: 10px 0;
}

.user-message {
	color:#00ffe5;
}

.assistant-message {
	color:#ffffff;
}

/* input */

.message-input {
	display:flex;
	margin-top:10px;
}

#user-input {
	flex:1;
	padding:10px;
	border-radius:8px;
	border:none;
	outline:none;
	background:#001014;
	color:#00ffe5;
}

button {
	margin-left:8px;
	padding:10px;
	background:#00ffe5;
	border:none;
	border-radius:8px;
	cursor:pointer;
	color:#000;
	font-weight:bold;
}

#typing-indicator {
	display:none;
	margin-top:5px;
	color:#888;
}
</style>
</head>

<body>

<!-- 🧠 HUD JARVIS -->
<div id="hud">
	<h3>JARVIS CORE</h3>
	<p>STATUS: ONLINE</p>
	<div class="hud-bar"><div></div></div>
</div>

<!-- 💬 CHAT -->
<div class="chat-container">

	<div id="chat-messages"></div>

	<div id="typing-indicator">Analizando...</div>

	<div class="message-input">
		<textarea id="user-input"></textarea>
		<button id="send-button">SEND</button>
	</div>

</div>

<script src="chat.js"></script>
</body>
</html>
